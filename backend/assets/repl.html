<div
  class="repl"
  data-id="{id}"
  data-readonly="{readonly}"
  data-lang="{lang}"
  data-editor-theme="{editor.theme}"
  data-editor-dark-theme="{editor.darkTheme}"
>
  <iframe
    class="hide"
    loading="{loading}"
    name="mdbook-{lang}-repl"
    allow="clipboard-write; fullscreen"
    src="{src}"
  ></iframe>
</div>
